<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MultiUploader</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg-glow"></div>
    <main class="shell">
      <section class="hero">
        <p class="kicker">Upload multiple services</p>
        <h1>MultiUploader</h1>
        <p class="subtitle">
          Upload one file to Gofile, 1fichier, Rootz, Send.now, Buzzheavier,
          Ranoz, Vikingfile, FileMirage, and Pixeldrain in one click.
        </p>
      </section>

      <section class="panel">
        <form id="upload-form">
          <label class="field">
            <span>File</span>
            <input id="file-input" name="file" type="file" required />
          </label>

          <div class="field">
            <span>Targets</span>
            <div class="targets">
              <label><input type="checkbox" value="gofile" checked /> gofile.io</label>
              <label><input type="checkbox" value="1fichier" checked /> 1fichier.com</label>
              <label><input type="checkbox" value="rootz" checked /> rootz.so</label>
              <label><input type="checkbox" value="sendnow" checked /> send.now</label>
              <label><input type="checkbox" value="buzzheavier" checked /> buzzheavier.com</label>
              <label><input type="checkbox" value="ranoz" checked /> ranoz.gg</label>
              <label><input type="checkbox" value="vikingfile" checked /> vikingfile.com</label>
              <label><input type="checkbox" value="filemirage" checked /> filemirage.com</label>
              <label><input type="checkbox" value="pixeldrain" checked /> pixeldrain.com</label>
            </div>
          </div>

          <details class="advanced">
            <summary>Advanced options (optional)</summary>

            <div class="field-grid">
              <label class="field">
                <span>Gofile token</span>
                <input id="opt-gofile-token" type="text" placeholder="Bearer token" />
              </label>

              <label class="field">
                <span>1fichier API key</span>
                <input id="opt-1fichier-apikey" type="text" placeholder="API key" />
              </label>

              <label class="field">
                <span>Rootz folderId</span>
                <input id="opt-rootz-folder" type="text" placeholder="folderId" />
              </label>

              <label class="field">
                <span>Buzzheavier locationId</span>
                <input id="opt-buzz-location" type="text" value="3eb9t1559lkv" />
              </label>

              <label class="field">
                <span>Send.now recipient</span>
                <input id="opt-sendnow-email" type="email" placeholder="email@domain.com" />
              </label>

              <label class="field">
                <span>Vikingfile user (optional)</span>
                <input id="opt-viking-user" type="text" placeholder="Leave empty for anonymous" />
              </label>

              <label class="field">
                <span>FileMirage API token (optional)</span>
                <input id="opt-filemirage-token" type="text" placeholder="Bearer token" />
              </label>

              <label class="field">
                <span>Pixeldrain API key (required)</span>
                <input id="opt-pixeldrain-key" type="text" placeholder="API key" />
              </label>
            </div>
          </details>

          <button id="submit-btn" type="submit">Start multi-upload</button>

          <div id="host-progress" class="host-progress" aria-live="polite"></div>
        </form>
      </section>

      <section class="panel results">
        <div class="results-head">
          <h2>Results</h2>
          <div class="results-actions">
            <button id="copy-all-btn" type="button" disabled>Copy all links</button>
            <p id="status-line">Ready.</p>
          </div>
        </div>
        <div id="results-list" class="results-list">
          <p class="empty">No upload started yet.</p>
        </div>
      </section>
    </main>

    <script>
      const form = document.getElementById("upload-form");
      const fileInput = document.getElementById("file-input");
      const submitBtn = document.getElementById("submit-btn");
      const copyAllBtn = document.getElementById("copy-all-btn");
      const statusLine = document.getElementById("status-line");
      const resultsList = document.getElementById("results-list");
      const hostProgress = document.getElementById("host-progress");
      const advancedDetails = document.querySelector("details.advanced");
      const targetInputs = [...document.querySelectorAll(".targets input[type='checkbox']")];
      const preferenceInputIds = [
        "opt-gofile-token",
        "opt-1fichier-apikey",
        "opt-rootz-folder",
        "opt-buzz-location",
        "opt-sendnow-email",
        "opt-viking-user",
        "opt-filemirage-token",
        "opt-pixeldrain-key"
      ];
      let lastLinks = [];
      const progressState = new Map();
      let progressTicker = null;
      let preferencesReady = false;
      let preferenceSaveTimer = null;

      function selectedTargets() {
        return targetInputs.filter((el) => el.checked).map((el) => el.value);
      }

      function collectPreferences() {
        const fields = {};
        for (const id of preferenceInputIds) {
          const el = document.getElementById(id);
          if (!el) {
            continue;
          }
          fields[id] = el.value;
        }

        return {
          targets: selectedTargets(),
          fields,
          advancedOpen: Boolean(advancedDetails?.open)
        };
      }

      async function readPreferencesFromServer() {
        const response = await fetch("/api/preferences", {
          method: "GET",
          cache: "no-store"
        });
        if (!response.ok) {
          return null;
        }
        const payload = await response.json();
        if (!payload || typeof payload !== "object") {
          return null;
        }
        const prefs = payload.preferences;
        return prefs && typeof prefs === "object" ? prefs : null;
      }

      async function writePreferencesToServer(payload) {
        const response = await fetch("/api/preferences", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        if (!response.ok) {
          throw new Error("Preferences save failed");
        }
      }

      function applyPreferences(payload) {
        if (!payload || typeof payload !== "object") {
          return;
        }

        if (Array.isArray(payload.targets)) {
          const selected = new Set(payload.targets.map((value) => String(value)));
          for (const input of targetInputs) {
            input.checked = selected.has(input.value);
          }
        }

        const fields = payload.fields;
        if (fields && typeof fields === "object") {
          for (const id of preferenceInputIds) {
            if (!Object.prototype.hasOwnProperty.call(fields, id)) {
              continue;
            }
            const el = document.getElementById(id);
            if (!el) {
              continue;
            }
            el.value = fields[id] == null ? "" : String(fields[id]);
          }
        }

        if (advancedDetails && typeof payload.advancedOpen === "boolean") {
          advancedDetails.open = payload.advancedOpen;
        }
      }

      function persistPreferences() {
        if (!preferencesReady) {
          return;
        }
        if (preferenceSaveTimer) {
          clearTimeout(preferenceSaveTimer);
        }
        preferenceSaveTimer = setTimeout(() => {
          writePreferencesToServer(collectPreferences()).catch(() => {});
        }, 180);
      }

      async function initializePreferences() {
        try {
          const serverPreferences = await readPreferencesFromServer();
          applyPreferences(serverPreferences);
        } catch (_err) {
          // Keep default UI state if preferences cannot be loaded.
        } finally {
          preferencesReady = true;
        }
      }

      function buildOptions() {
        const options = {
          gofile: {},
          "1fichier": {},
          rootz: {},
          buzzheavier: {},
          sendnow: {},
          vikingfile: {},
          filemirage: {},
          pixeldrain: {}
        };

        const gofileToken = document.getElementById("opt-gofile-token").value.trim();
        const onefichierApiKey = document.getElementById("opt-1fichier-apikey").value.trim();
        const rootzFolder = document.getElementById("opt-rootz-folder").value.trim();
        const buzzLocation = document.getElementById("opt-buzz-location").value.trim();
        const sendnowEmail = document.getElementById("opt-sendnow-email").value.trim();
        const vikingUser = document.getElementById("opt-viking-user").value.trim();
        const filemirageToken = document.getElementById("opt-filemirage-token").value.trim();
        const pixeldrainKey = document.getElementById("opt-pixeldrain-key").value.trim();

        if (gofileToken) {
          options.gofile.token = gofileToken;
        }
        if (onefichierApiKey) {
          options["1fichier"].apiKey = onefichierApiKey;
        }
        if (rootzFolder) {
          options.rootz.folderId = rootzFolder;
        }
        if (buzzLocation) {
          options.buzzheavier.locationId = buzzLocation;
        }
        if (sendnowEmail) {
          options.sendnow.link_rcpt = sendnowEmail;
        }
        if (vikingUser) {
          options.vikingfile.user = vikingUser;
        }
        if (filemirageToken) {
          options.filemirage.apiToken = filemirageToken;
        }
        if (pixeldrainKey) {
          options.pixeldrain.apiKey = pixeldrainKey;
        }

        return options;
      }

      function statusTextFor(state) {
        if (state.status === "running") return "UPLOADING";
        if (state.status === "ok") return "DONE";
        if (state.status === "ko") return "ERROR";
        return "WAITING";
      }

      function statusClassFor(state) {
        if (state.status === "running") return "running";
        if (state.status === "ok") return "ok";
        if (state.status === "ko") return "ko";
        return "pending";
      }

      function stopProgressTicker() {
        if (progressTicker) {
          clearInterval(progressTicker);
          progressTicker = null;
        }
      }

      function renderProgress() {
        if (!progressState.size) {
          hostProgress.innerHTML = "";
          return;
        }

        const html = [...progressState.entries()]
          .map(([target, state]) => {
            const safeProgress = Math.max(0, Math.min(100, Math.round(state.progress || 0)));
            const rowClass = statusClassFor(state);
            const statusText = state.message || statusTextFor(state);
            return `
              <article class="host-progress-item ${rowClass}">
                <div class="host-progress-head">
                  <strong>${target}</strong>
                  <span>${statusText}</span>
                </div>
                <div class="host-progress-track">
                  <div class="host-progress-fill" style="width:${safeProgress}%"></div>
                </div>
              </article>
            `;
          })
          .join("");

        hostProgress.innerHTML = html;
      }

      function initProgress(targets) {
        stopProgressTicker();
        progressState.clear();
        for (const target of targets) {
          progressState.set(target, {
            status: "pending",
            progress: 0,
            message: ""
          });
        }
        renderProgress();

        progressTicker = setInterval(() => {
          let changed = false;
          for (const [, state] of progressState.entries()) {
            if (state.status !== "running") {
              continue;
            }
            if (state.progress >= 92) {
              continue;
            }
            state.progress = Math.min(92, state.progress + (Math.random() * 7 + 2));
            changed = true;
          }
          if (changed) {
            renderProgress();
          }
        }, 350);
      }

      function setProgressState(target, patch) {
        const current = progressState.get(target);
        if (!current) {
          return;
        }
        progressState.set(target, { ...current, ...patch });
        renderProgress();
      }

      function finalizeProgressAfterFailure() {
        for (const [target, state] of progressState.entries()) {
          if (state.status === "ok" || state.status === "ko") {
            continue;
          }
          progressState.set(target, {
            ...state,
            status: "ko",
            progress: 100,
            message: "FAILED"
          });
        }
        renderProgress();
      }

      async function uploadWithStream(body, onEvent) {
        const response = await fetch("/api/upload/stream", {
          method: "POST",
          body
        });

        if (!response.ok) {
          let payload = null;
          try {
            payload = await response.json();
          } catch (_err) {
            payload = null;
          }
          throw new Error(payload?.error || "Upload request failed");
        }

        if (!response.body) {
          throw new Error("Streaming is not available in this runtime.");
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";

        while (true) {
          const { value, done } = await reader.read();
          if (done) {
            break;
          }

          buffer += decoder.decode(value, { stream: true });
          let lineBreak = buffer.indexOf("\n");
          while (lineBreak !== -1) {
            const rawLine = buffer.slice(0, lineBreak).trim();
            buffer = buffer.slice(lineBreak + 1);
            if (rawLine) {
              onEvent(JSON.parse(rawLine));
            }
            lineBreak = buffer.indexOf("\n");
          }
        }

        const trailing = buffer.trim();
        if (trailing) {
          onEvent(JSON.parse(trailing));
        }
      }

      function renderResults(payload) {
        const entries = Object.entries(payload.results || {});
        lastLinks = entries
          .map(([, result]) => (result && result.ok ? result.url : null))
          .filter((url) => typeof url === "string" && url.length > 0);
        copyAllBtn.disabled = lastLinks.length === 0;

        if (!entries.length) {
          resultsList.innerHTML = '<p class="empty">No results.</p>';
          return;
        }

        const html = entries
          .map(([requestedTarget, result]) => {
            if (result.ok) {
              const url = result.url
                ? `<a href="${result.url}" target="_blank" rel="noopener noreferrer">${result.url}</a>`
                : "<span>No link returned</span>";
              return `
                <article class="result ok">
                  <div class="result-top">
                    <strong>${requestedTarget}</strong>
                    <span>OK</span>
                  </div>
                  <div class="result-body">${url}</div>
                </article>
              `;
            }
            const details = result.details
              ? `<pre>${JSON.stringify(result.details, null, 2)}</pre>`
              : "";
            return `
              <article class="result ko">
                <div class="result-top">
                  <strong>${requestedTarget}</strong>
                  <span>ERROR</span>
                </div>
                <div class="result-body">
                  <p>${result.error || "Unknown error"}</p>
                  ${details}
                </div>
              </article>
            `;
          })
          .join("");

        resultsList.innerHTML = html;
      }

      copyAllBtn.addEventListener("click", async () => {
        if (!lastLinks.length) {
          return;
        }
        try {
          await navigator.clipboard.writeText(lastLinks.join("\n"));
          statusLine.textContent = `${lastLinks.length} link(s) copied.`;
        } catch (error) {
          statusLine.textContent = "Automatic copy failed.";
        }
      });

      initializePreferences();
      for (const input of targetInputs) {
        input.addEventListener("change", persistPreferences);
      }
      for (const id of preferenceInputIds) {
        const field = document.getElementById(id);
        if (!field) {
          continue;
        }
        field.addEventListener("input", persistPreferences);
        field.addEventListener("change", persistPreferences);
      }
      if (advancedDetails) {
        advancedDetails.addEventListener("toggle", persistPreferences);
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        const file = fileInput.files[0];
        const targets = selectedTargets();

        if (!file) {
          statusLine.textContent = "Select a file.";
          return;
        }
        if (!targets.length) {
          statusLine.textContent = "Select at least one target.";
          return;
        }

        const options = buildOptions();
        const body = new FormData();
        body.append("file", file);
        body.append("targets", JSON.stringify(targets));
        body.append("options", JSON.stringify(options));
        initProgress(targets);

        submitBtn.disabled = true;
        submitBtn.textContent = "Uploading...";
        statusLine.textContent = `Uploading ${file.name} to ${targets.length} target(s)...`;
        resultsList.innerHTML = '<p class="empty">Processing...</p>';

        try {
          const aggregatedResults = {};

          await uploadWithStream(body, (eventPayload) => {
            if (eventPayload.type === "target_start") {
              setProgressState(eventPayload.requestedTarget, {
                status: "running",
                progress: 7,
                message: ""
              });
              return;
            }

            if (eventPayload.type === "target_result") {
              const result = eventPayload.result || {};
              aggregatedResults[eventPayload.requestedTarget] = result;
              setProgressState(eventPayload.requestedTarget, {
                status: result.ok ? "ok" : "ko",
                progress: 100,
                message: result.ok ? "DONE" : "ERROR"
              });
              renderResults({ results: aggregatedResults });
              return;
            }

            if (eventPayload.type === "done") {
              renderResults({ results: eventPayload.results || aggregatedResults });
            }
          });

          stopProgressTicker();
          statusLine.textContent = "Done.";
        } catch (error) {
          stopProgressTicker();
          finalizeProgressAfterFailure();
          resultsList.innerHTML = `<p class="empty">Error: ${error.message}</p>`;
          statusLine.textContent = "Failed.";
        } finally {
          stopProgressTicker();
          submitBtn.disabled = false;
          submitBtn.textContent = "Start multi-upload";
        }
      });
    </script>
  </body>
</html>
