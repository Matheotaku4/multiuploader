<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Upify</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg-glow"></div>
    <main class="shell">
      <section class="hero">
        <img class="brand-logo" src="/logo.png" alt="Upify" />
        <p id="upload-stats" class="upload-stats">You have uploaded 0.00 Go</p>
      </section>

      <section class="panel">
        <form id="upload-form">
          <label class="field">
            <span>File</span>
            <input id="file-input" name="file" type="file" required />
          </label>

          <div class="field">
            <span>Targets</span>
            <div class="targets">
              <label><input type="checkbox" value="gofile" checked /> gofile.io</label>
              <label><input type="checkbox" value="1fichier" checked /> 1fichier.com</label>
              <label><input type="checkbox" value="rootz" checked /> rootz.so</label>
              <label><input type="checkbox" value="sendnow" checked /> send.now</label>
              <label><input type="checkbox" value="buzzheavier" checked /> buzzheavier.com</label>
              <label><input type="checkbox" value="ranoz" checked /> ranoz.gg</label>
              <label><input type="checkbox" value="vikingfile" checked /> vikingfile.com</label>
              <label><input type="checkbox" value="filemirage" checked /> filemirage.com</label>
              <label><input type="checkbox" value="pixeldrain" checked /> pixeldrain.com</label>
              <label><input type="checkbox" value="bowfile" checked /> BowFile</label>
              <label><input type="checkbox" value="akirabox" checked /> akirabox.com</label>
            </div>
          </div>

          <div class="advanced-title-row">
            <span>Advanced options (optional)</span>
            <a
              id="api-help-link"
              class="api-help-btn"
              href="https://github.com/Matheotaku4/Upify/blob/main/API.md"
              target="_blank"
              rel="noopener noreferrer"
            >
              API help
            </a>
          </div>

          <details class="advanced">
            <summary>Show or hide options</summary>

            <div class="field-grid">
              <label class="field">
                <span>Gofile token</span>
                <input id="opt-gofile-token" type="text" placeholder="Bearer token" />
              </label>

              <label class="field">
                <span>1fichier API key</span>
                <input id="opt-1fichier-apikey" type="text" placeholder="API key" />
              </label>

              <label class="field">
                <span>Rootz folderId</span>
                <input id="opt-rootz-folder" type="text" placeholder="folderId" />
              </label>

              <label class="field">
                <span>Buzzheavier locationId</span>
                <input id="opt-buzz-location" type="text" value="3eb9t1559lkv" />
              </label>

              <label class="field">
                <span>Send.now recipient</span>
                <input id="opt-sendnow-email" type="email" placeholder="email@domain.com" />
              </label>

              <label class="field">
                <span>Vikingfile user (optional)</span>
                <input id="opt-viking-user" type="text" placeholder="Leave empty for anonymous" />
              </label>

              <label class="field">
                <span>FileMirage API token (optional)</span>
                <input id="opt-filemirage-token" type="text" placeholder="Bearer token" />
              </label>

              <label class="field">
                <span>Pixeldrain API key (required)</span>
                <input id="opt-pixeldrain-key" type="text" placeholder="API key" />
              </label>

              <label class="field">
                <span>BowFile Key 1</span>
                <input id="opt-bowfile-key1" type="text" placeholder="Key 1" />
              </label>

              <label class="field">
                <span>BowFile Key 2</span>
                <input id="opt-bowfile-key2" type="text" placeholder="Key 2" />
              </label>

              <label class="field">
                <span>BowFile folder ID (optional)</span>
                <input id="opt-bowfile-folder" type="text" placeholder="Folder ID" />
              </label>

              <label class="field">
                <span>AkiraBox API key (required)</span>
                <input id="opt-akirabox-apikey" type="text" placeholder="API key" />
              </label>
            </div>
          </details>

          <div class="upload-actions">
            <button id="submit-btn" type="submit">Start multi-upload</button>
            <button id="cancel-all-btn" type="button" disabled>Cancel all</button>
          </div>

          <div id="host-progress" class="host-progress" aria-live="polite"></div>
        </form>
      </section>

      <section class="panel results">
        <div class="results-head">
          <h2>Results</h2>
          <div class="results-actions">
            <button id="save-links-btn" type="button" disabled>Save links (.txt)</button>
            <button id="copy-all-btn" type="button" disabled>Copy all links</button>
            <p id="status-line">Ready.</p>
          </div>
        </div>
        <div id="results-list" class="results-list">
          <p class="empty">No upload started yet.</p>
        </div>
      </section>
    </main>

    <script>
      const form = document.getElementById("upload-form");
      const fileInput = document.getElementById("file-input");
      const submitBtn = document.getElementById("submit-btn");
      const cancelAllBtn = document.getElementById("cancel-all-btn");
      const copyAllBtn = document.getElementById("copy-all-btn");
      const saveLinksBtn = document.getElementById("save-links-btn");
      const statusLine = document.getElementById("status-line");
      const resultsList = document.getElementById("results-list");
      const hostProgress = document.getElementById("host-progress");
      const uploadStatsLine = document.getElementById("upload-stats");
      const advancedDetails = document.querySelector("details.advanced");
      const targetInputs = [...document.querySelectorAll(".targets input[type='checkbox']")];
      const preferenceInputIds = [
        "opt-gofile-token",
        "opt-1fichier-apikey",
        "opt-rootz-folder",
        "opt-buzz-location",
        "opt-sendnow-email",
        "opt-viking-user",
        "opt-filemirage-token",
        "opt-pixeldrain-key",
        "opt-bowfile-key1",
        "opt-bowfile-key2",
        "opt-bowfile-folder",
        "opt-akirabox-apikey"
      ];
      let lastLinks = [];
      const progressState = new Map();
      let progressTicker = null;
      let preferencesReady = false;
      let preferenceSaveTimer = null;
      let notificationPermissionAsked = false;
      let totalUploadedBytes = 0;
      let currentUpload = null;
      let lastFileName = "upify";

      function selectedTargets() {
        return targetInputs.filter((el) => el.checked).map((el) => el.value);
      }

      function collectPreferences() {
        const fields = {};
        for (const id of preferenceInputIds) {
          const el = document.getElementById(id);
          if (!el) {
            continue;
          }
          fields[id] = el.value;
        }

        return {
          targets: selectedTargets(),
          fields,
          advancedOpen: Boolean(advancedDetails?.open)
        };
      }

      async function readPreferencesFromServer() {
        const response = await fetch("/api/preferences", {
          method: "GET",
          cache: "no-store"
        });
        if (!response.ok) {
          return null;
        }
        const payload = await response.json();
        if (!payload || typeof payload !== "object") {
          return null;
        }
        const prefs = payload.preferences;
        return prefs && typeof prefs === "object" ? prefs : null;
      }

      async function writePreferencesToServer(payload) {
        const response = await fetch("/api/preferences", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        if (!response.ok) {
          throw new Error("Preferences save failed");
        }
      }

      function applyPreferences(payload) {
        if (!payload || typeof payload !== "object") {
          return;
        }

        if (Array.isArray(payload.targets)) {
          const selected = new Set(payload.targets.map((value) => String(value)));
          for (const input of targetInputs) {
            input.checked = selected.has(input.value);
          }
        }

        const fields = payload.fields;
        if (fields && typeof fields === "object") {
          for (const id of preferenceInputIds) {
            if (!Object.prototype.hasOwnProperty.call(fields, id)) {
              continue;
            }
            const el = document.getElementById(id);
            if (!el) {
              continue;
            }
            el.value = fields[id] == null ? "" : String(fields[id]);
          }
        }

        if (advancedDetails && typeof payload.advancedOpen === "boolean") {
          advancedDetails.open = payload.advancedOpen;
        }
      }

      function persistPreferences() {
        if (!preferencesReady) {
          return;
        }
        if (preferenceSaveTimer) {
          clearTimeout(preferenceSaveTimer);
        }
        preferenceSaveTimer = setTimeout(() => {
          writePreferencesToServer(collectPreferences()).catch(() => {});
        }, 180);
      }

      async function initializePreferences() {
        try {
          const serverPreferences = await readPreferencesFromServer();
          applyPreferences(serverPreferences);
        } catch (_err) {
          // Keep default UI state if preferences cannot be loaded.
        } finally {
          preferencesReady = true;
        }
      }

      function formatBytesToGo(bytes) {
        const value = Number(bytes) || 0;
        return (value / (1024 ** 3)).toFixed(2);
      }

      function renderUploadStats() {
        uploadStatsLine.textContent = `You have uploaded ${formatBytesToGo(totalUploadedBytes)} Go`;
      }

      async function refreshUploadStats() {
        try {
          const response = await fetch("/api/stats", { method: "GET", cache: "no-store" });
          if (!response.ok) {
            return;
          }
          const payload = await response.json();
          const stats = payload?.stats || {};
          totalUploadedBytes = Number(stats.totalUploadedBytes || 0);
          renderUploadStats();
        } catch (_err) {
          // Keep current visible value on fetch failure.
        }
      }

      async function requestNotificationPermission() {
        if (!("Notification" in window)) {
          return;
        }
        if (Notification.permission === "granted" || Notification.permission === "denied") {
          return;
        }
        if (notificationPermissionAsked) {
          return;
        }
        notificationPermissionAsked = true;
        try {
          await Notification.requestPermission();
        } catch (_err) {
          // Ignore permission request errors.
        }
      }

      function summarizeUploadResults(resultsByTarget, totalTargets) {
        const results = Object.values(resultsByTarget || {});
        const okCount = results.filter((entry) => entry && entry.ok).length;
        const koCount = Math.max(0, totalTargets - okCount);
        return { total: totalTargets, okCount, koCount };
      }

      function notifyUploadFinished(fileName, summary) {
        if (!("Notification" in window)) {
          return;
        }
        if (Notification.permission !== "granted") {
          return;
        }
        const label = `${summary.okCount}/${summary.total} succeeded, ${summary.koCount} failed`;
        try {
          new Notification("Upify upload complete", {
            body: `${fileName}: ${label}`
          });
        } catch (_err) {
          // Ignore notification errors.
        }
      }

      function buildOptions() {
        const options = {
          gofile: {},
          "1fichier": {},
          rootz: {},
          buzzheavier: {},
          sendnow: {},
          vikingfile: {},
          filemirage: {},
          pixeldrain: {},
          bowfile: {},
          akirabox: {}
        };

        const gofileToken = document.getElementById("opt-gofile-token").value.trim();
        const onefichierApiKey = document.getElementById("opt-1fichier-apikey").value.trim();
        const rootzFolder = document.getElementById("opt-rootz-folder").value.trim();
        const buzzLocation = document.getElementById("opt-buzz-location").value.trim();
        const sendnowEmail = document.getElementById("opt-sendnow-email").value.trim();
        const vikingUser = document.getElementById("opt-viking-user").value.trim();
        const filemirageToken = document.getElementById("opt-filemirage-token").value.trim();
        const pixeldrainKey = document.getElementById("opt-pixeldrain-key").value.trim();
        const bowfileKey1 = document.getElementById("opt-bowfile-key1").value.trim();
        const bowfileKey2 = document.getElementById("opt-bowfile-key2").value.trim();
        const bowfileFolder = document.getElementById("opt-bowfile-folder").value.trim();
        const akiraboxApiKey = document.getElementById("opt-akirabox-apikey").value.trim();

        if (gofileToken) {
          options.gofile.token = gofileToken;
        }
        if (onefichierApiKey) {
          options["1fichier"].apiKey = onefichierApiKey;
        }
        if (rootzFolder) {
          options.rootz.folderId = rootzFolder;
        }
        if (buzzLocation) {
          options.buzzheavier.locationId = buzzLocation;
        }
        if (sendnowEmail) {
          options.sendnow.link_rcpt = sendnowEmail;
        }
        if (vikingUser) {
          options.vikingfile.user = vikingUser;
        }
        if (filemirageToken) {
          options.filemirage.apiToken = filemirageToken;
        }
        if (pixeldrainKey) {
          options.pixeldrain.apiKey = pixeldrainKey;
        }
        if (bowfileKey1) {
          options.bowfile.key1 = bowfileKey1;
        }
        if (bowfileKey2) {
          options.bowfile.key2 = bowfileKey2;
        }
        if (bowfileFolder) {
          options.bowfile.folderId = bowfileFolder;
        }
        if (akiraboxApiKey) {
          options.akirabox.apiKey = akiraboxApiKey;
        }

        return options;
      }

      function statusTextFor(state) {
        if (state.status === "running") return "UPLOADING";
        if (state.status === "ok") return "DONE";
        if (state.status === "ko") return "ERROR";
        if (state.status === "canceled") return "CANCELED";
        return "WAITING";
      }

      function statusClassFor(state) {
        if (state.status === "running") return "running";
        if (state.status === "ok") return "ok";
        if (state.status === "ko") return "ko";
        if (state.status === "canceled") return "canceled";
        return "pending";
      }

      function stopProgressTicker() {
        if (progressTicker) {
          clearInterval(progressTicker);
          progressTicker = null;
        }
      }

      function renderProgress() {
        if (!progressState.size) {
          hostProgress.innerHTML = "";
          return;
        }

        const html = [...progressState.entries()]
          .map(([target, state]) => {
            const safeProgress = Math.max(0, Math.min(100, Math.round(state.progress || 0)));
            const rowClass = statusClassFor(state);
            const statusText = state.message || statusTextFor(state);
            const canCancel =
              currentUpload &&
              (state.status === "running" || state.status === "pending");
            const cancelButton = canCancel
              ? `<button class="host-cancel-btn" type="button" data-target="${target}">Cancel</button>`
              : "";
            return `
              <article class="host-progress-item ${rowClass}">
                <div class="host-progress-head">
                  <strong>${target}</strong>
                  <div class="host-progress-actions">
                    <span>${statusText}</span>
                    ${cancelButton}
                  </div>
                </div>
                <div class="host-progress-track">
                  <div class="host-progress-fill" style="width:${safeProgress}%"></div>
                </div>
              </article>
            `;
          })
          .join("");

        hostProgress.innerHTML = html;
      }

      function initProgress(targets) {
        stopProgressTicker();
        progressState.clear();
        for (const target of targets) {
          progressState.set(target, {
            status: "pending",
            progress: 0,
            message: ""
          });
        }
        renderProgress();

        progressTicker = setInterval(() => {
          let changed = false;
          for (const [, state] of progressState.entries()) {
            if (state.status !== "running") {
              continue;
            }
            if (state.progress >= 92) {
              continue;
            }
            state.progress = Math.min(92, state.progress + (Math.random() * 7 + 2));
            changed = true;
          }
          if (changed) {
            renderProgress();
          }
        }, 350);
      }

      function setProgressState(target, patch) {
        const current = progressState.get(target);
        if (!current) {
          return;
        }
        progressState.set(target, { ...current, ...patch });
        renderProgress();
      }

      function finalizeProgressAfterFailure() {
        for (const [target, state] of progressState.entries()) {
          if (state.status === "ok" || state.status === "ko" || state.status === "canceled") {
            continue;
          }
          progressState.set(target, {
            ...state,
            status: "ko",
            progress: 100,
            message: "FAILED"
          });
        }
        renderProgress();
      }

      function buildJobId() {
        if (window.crypto && typeof window.crypto.randomUUID === "function") {
          return window.crypto.randomUUID();
        }
        return `upify-${Date.now()}-${Math.random().toString(16).slice(2)}`;
      }

      async function cancelUpload(target = null) {
        if (!currentUpload?.jobId) {
          return;
        }
        try {
          await fetch("/api/upload/cancel", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              jobId: currentUpload.jobId,
              target
            })
          });
        } catch (_err) {
          // Ignore network errors during cancellation.
        }
      }

      function markTargetAsCanceled(target) {
        setProgressState(target, {
          status: "canceled",
          progress: 100,
          message: "CANCELED"
        });
      }

      async function uploadWithStream(body, onEvent) {
        const response = await fetch("/api/upload/stream", {
          method: "POST",
          body
        });

        if (!response.ok) {
          let payload = null;
          try {
            payload = await response.json();
          } catch (_err) {
            payload = null;
          }
          throw new Error(payload?.error || "Upload request failed");
        }

        if (!response.body) {
          throw new Error("Streaming is not available in this runtime.");
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";

        while (true) {
          const { value, done } = await reader.read();
          if (done) {
            break;
          }

          buffer += decoder.decode(value, { stream: true });
          let lineBreak = buffer.indexOf("\n");
          while (lineBreak !== -1) {
            const rawLine = buffer.slice(0, lineBreak).trim();
            buffer = buffer.slice(lineBreak + 1);
            if (rawLine) {
              onEvent(JSON.parse(rawLine));
            }
            lineBreak = buffer.indexOf("\n");
          }
        }

        const trailing = buffer.trim();
        if (trailing) {
          onEvent(JSON.parse(trailing));
        }
      }

      function renderResults(payload) {
        const entries = Object.entries(payload.results || {});
        lastLinks = entries
          .map(([, result]) => (result && result.ok ? result.url : null))
          .filter((url) => typeof url === "string" && url.length > 0);
        updateLinkActions();

        if (!entries.length) {
          resultsList.innerHTML = '<p class="empty">No results.</p>';
          return;
        }

        const html = entries
          .map(([requestedTarget, result]) => {
            if (result.ok) {
              const url = result.url
                ? `<a href="${result.url}" target="_blank" rel="noopener noreferrer">${result.url}</a>`
                : "<span>No link returned</span>";
              return `
                <article class="result ok">
                  <div class="result-top">
                    <strong>${requestedTarget}</strong>
                    <span>OK</span>
                  </div>
                  <div class="result-body">${url}</div>
                </article>
              `;
            }
            const details = result.details
              ? `<pre>${JSON.stringify(result.details, null, 2)}</pre>`
              : "";
            return `
              <article class="result ko">
                <div class="result-top">
                  <strong>${requestedTarget}</strong>
                  <span>ERROR</span>
                </div>
                <div class="result-body">
                  <p>${result.error || "Unknown error"}</p>
                  ${details}
                </div>
              </article>
            `;
          })
          .join("");

        resultsList.innerHTML = html;
      }

      function updateLinkActions() {
        const hasLinks = lastLinks.length > 0;
        copyAllBtn.disabled = !hasLinks;
        saveLinksBtn.disabled = !hasLinks;
      }

      copyAllBtn.addEventListener("click", async () => {
        if (!lastLinks.length) {
          return;
        }
        try {
          await navigator.clipboard.writeText(lastLinks.join("\n"));
          statusLine.textContent = `${lastLinks.length} link(s) copied.`;
        } catch (error) {
          statusLine.textContent = "Automatic copy failed.";
        }
      });

      initializePreferences();
      refreshUploadStats();
      for (const input of targetInputs) {
        input.addEventListener("change", persistPreferences);
      }
      for (const id of preferenceInputIds) {
        const field = document.getElementById(id);
        if (!field) {
          continue;
        }
        field.addEventListener("input", persistPreferences);
        field.addEventListener("change", persistPreferences);
      }
      if (advancedDetails) {
        advancedDetails.addEventListener("toggle", persistPreferences);
      }

      hostProgress.addEventListener("click", (event) => {
        const button = event.target.closest(".host-cancel-btn");
        if (!button) {
          return;
        }
        const target = button.getAttribute("data-target");
        if (!target) {
          return;
        }
        markTargetAsCanceled(target);
        cancelUpload(target);
      });

      saveLinksBtn.addEventListener("click", () => {
        if (!lastLinks.length) {
          return;
        }
        const now = new Date();
        const timestamp = now.toLocaleString("en-GB", {
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
          hour12: false
        });
        const header = `File: ${lastFileName}\nDate: ${timestamp}\n\n`;
        const content = `${header}${lastLinks.join("\n")}`;
        const blob = new Blob([content], { type: "text/plain;charset=utf-8" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `${lastFileName || "links"}-${timestamp.replace(/[: ]/g, "-")}.txt`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(link.href);
      });

      cancelAllBtn.addEventListener("click", () => {
        if (!currentUpload?.jobId) {
          return;
        }
        for (const [target, state] of progressState.entries()) {
          if (state.status === "ok" || state.status === "ko" || state.status === "canceled") {
            continue;
          }
          markTargetAsCanceled(target);
        }
        cancelUpload(null);
        statusLine.textContent = "Cancelling upload...";
      });

      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        const file = fileInput.files[0];
        lastFileName = file?.name || "upify";
        const targets = selectedTargets();

        if (!file) {
          statusLine.textContent = "Select a file.";
          return;
        }
        if (!targets.length) {
          statusLine.textContent = "Select at least one target.";
          return;
        }

        const options = buildOptions();
        const body = new FormData();
        const jobId = buildJobId();
        body.append("file", file);
        body.append("targets", JSON.stringify(targets));
        body.append("options", JSON.stringify(options));
        body.append("jobId", jobId);
        initProgress(targets);
        await requestNotificationPermission();
        currentUpload = { jobId };

        submitBtn.disabled = true;
        cancelAllBtn.disabled = false;
        submitBtn.textContent = "Uploading...";
        statusLine.textContent = `Uploading ${file.name} to ${targets.length} target(s)...`;
        resultsList.innerHTML = '<p class="empty">Processing...</p>';

        try {
          const aggregatedResults = {};
          let finalResults = null;

          await uploadWithStream(body, (eventPayload) => {
            if (eventPayload.type === "target_start") {
              setProgressState(eventPayload.requestedTarget, {
                status: "running",
                progress: 7,
                message: ""
              });
              return;
            }

            if (eventPayload.type === "target_result") {
              const result = eventPayload.result || {};
              aggregatedResults[eventPayload.requestedTarget] = result;
              if (result.canceled) {
                setProgressState(eventPayload.requestedTarget, {
                  status: "canceled",
                  progress: 100,
                  message: "CANCELED"
                });
                renderResults({ results: aggregatedResults });
                return;
              }
              setProgressState(eventPayload.requestedTarget, {
                status: result.ok ? "ok" : "ko",
                progress: 100,
                message: result.ok ? "DONE" : "ERROR"
              });
              renderResults({ results: aggregatedResults });
              return;
            }

            if (eventPayload.type === "done") {
              finalResults = eventPayload.results || aggregatedResults;
              if (eventPayload.stats && Number.isFinite(Number(eventPayload.stats.totalUploadedBytes))) {
                totalUploadedBytes = Number(eventPayload.stats.totalUploadedBytes);
                renderUploadStats();
              }
              renderResults({ results: finalResults });
            }
          });

          stopProgressTicker();
          statusLine.textContent = "Done.";
          if (!finalResults) {
            finalResults = aggregatedResults;
          }
          await refreshUploadStats();
          notifyUploadFinished(
            file.name,
            summarizeUploadResults(finalResults || aggregatedResults, targets.length)
          );
        } catch (error) {
          stopProgressTicker();
          finalizeProgressAfterFailure();
          resultsList.innerHTML = `<p class="empty">Error: ${error.message}</p>`;
          statusLine.textContent = "Failed.";
          notifyUploadFinished(
            file.name,
            { total: targets.length, okCount: 0, koCount: targets.length }
          );
        } finally {
          currentUpload = null;
          stopProgressTicker();
          submitBtn.disabled = false;
          cancelAllBtn.disabled = true;
          submitBtn.textContent = "Start multi-upload";
        }
      });
    </script>
  </body>
</html>
